<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi Tiêu Cá Nhân</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .card { transition: all 0.3s ease; }
    .chart-container { position: relative; height: 260px; }
    @media (min-width: 1024px) { .chart-container { height: 340px; } }
    .stat-value { font-size: 1.5rem; line-height: 1.25; }
    .modal { animation: modalPop 0.3s ease forwards; }
    @keyframes modalPop { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen pb-20">

<div class="max-w-7xl mx-auto p-4 sm:p-6">
  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
    <div>
      <h1 class="text-2xl sm:text-3xl font-bold text-indigo-700 flex items-center gap-3">
        <i class="fa-solid fa-wallet"></i> Chi Tiêu Cá Nhân
      </h1>
      <p class="text-gray-500 text-sm">Tháng 4/2026 • Phân tích chi tiêu</p>
    </div>
    <div class="flex gap-3">
      <select id="filterMonth" class="bg-white border border-gray-300 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 w-full sm:w-auto">
        <option value="">Tất cả thời gian</option>
        <option value="2026-04" selected>Tháng 4/2026</option>
        <option value="2026-03">Tháng 3/2026</option>
      </select>
      <button onclick="resetFilters()" class="bg-white border border-gray-300 hover:bg-gray-100 px-5 py-3 rounded-2xl flex items-center gap-2 text-sm whitespace-nowrap">
        <i class="fa-solid fa-rotate"></i><span class="hidden sm:inline">Đặt lại</span>
      </button>
    </div>
  </div>

  <!-- Thống kê -->
  <div class="grid grid-cols-2 gap-4 mb-8">
    <div class="bg-white rounded-3xl p-5 card shadow-sm border border-gray-100">
      <p class="text-xs text-gray-500">Tổng thu</p>
      <p id="totalIncome" class="stat-value font-semibold text-emerald-600 mt-2">13.600.000 ₫</p>
    </div>
    <div class="bg-white rounded-3xl p-5 card shadow-sm border border-gray-100">
      <p class="text-xs text-gray-500">Tổng chi</p>
      <p id="totalExpense" class="stat-value font-semibold text-rose-600 mt-2">12.344.000 ₫</p>
    </div>
    <div class="bg-white rounded-3xl p-5 card shadow-sm border border-gray-100">
      <p class="text-xs text-gray-500">Số dư (Thu - Chi)</p>
      <p id="netBalance" class="stat-value font-semibold text-indigo-700 mt-2">1.256.000 ₫</p>
    </div>
    <div class="bg-white rounded-3xl p-5 card shadow-sm border border-gray-100">
      <p class="text-xs text-gray-500">Số giao dịch</p>
      <p id="transactionCount" class="stat-value font-semibold text-gray-700 mt-2">30</p>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <!-- Pie Chart -->
    <div class="bg-white rounded-3xl p-6 card shadow-sm">
      <h2 class="text-lg font-semibold mb-5 flex items-center gap-2">
        <i class="fa-solid fa-chart-pie text-indigo-600"></i> Phân bổ chi tiêu
      </h2>
      <div class="chart-container"><canvas id="pieChart"></canvas></div>
    </div>

    <!-- Bar Chart -->
    <div class="bg-white rounded-3xl p-6 card shadow-sm">
      <h2 class="text-lg font-semibold mb-5 flex items-center gap-2">
        <i class="fa-solid fa-chart-column text-indigo-600"></i> Chi theo danh mục
      </h2>
      <div class="chart-container"><canvas id="barChart"></canvas></div>
    </div>

    <!-- Line Chart -->
    <div class="bg-white rounded-3xl p-6 card shadow-sm lg:col-span-2">
      <h2 class="text-lg font-semibold mb-5 flex items-center gap-2">
        <i class="fa-solid fa-chart-line text-indigo-600"></i> Xu hướng thu - chi
      </h2>
      <div class="chart-container" style="height: 320px;"><canvas id="lineChart"></canvas></div>
    </div>
  </div>

  <!-- Giao dịch gần đây -->
  <div class="mt-10 bg-white rounded-3xl p-6 card shadow-sm">
    <h2 class="text-lg font-semibold mb-6 flex items-center gap-2">
      <i class="fa-solid fa-clock-rotate-left"></i> Giao dịch gần đây
    </h2>
    <div id="transactionList" class="space-y-4 max-h-[420px] overflow-y-auto pr-2"></div>
  </div>
</div>

<!-- Nút FAB -->
<button onclick="openAddModal()" class="fixed bottom-6 right-6 w-14 h-14 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full flex items-center justify-center shadow-lg text-3xl z-50">
  <i class="fa-solid fa-plus"></i>
</button>

<!-- POPUP THÊM GIAO DỊCH -->
<div id="addModal" onclick="if(event.target === this) closeModal()" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[9999] p-4">
  <div onclick="event.stopImmediatePropagation()" class="modal bg-white rounded-3xl max-w-md w-full shadow-2xl">
    <div class="flex justify-between items-center px-6 pt-6 pb-4 border-b">
      <h3 class="text-2xl font-semibold text-gray-800 flex items-center gap-2">
        <i class="fa-solid fa-plus-circle text-indigo-600"></i> Thêm giao dịch mới
      </h3>
      <button onclick="closeModal()" class="w-9 h-9 flex items-center justify-center text-2xl text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-2xl">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <form id="addForm" onsubmit="handleAddTransaction(event)" class="p-6 space-y-6">
      <!-- Loại -->
      <div>
        <label class="text-xs uppercase tracking-widest text-gray-500 mb-3 block font-medium">Loại giao dịch</label>
        <div class="flex border border-gray-200 rounded-3xl p-1 bg-gray-50">
          <button type="button" id="btnExpense" onclick="setType('expense')" class="flex-1 py-4 text-base font-semibold rounded-3xl flex items-center justify-center gap-2 transition-all">Chi tiêu</button>
          <button type="button" id="btnIncome" onclick="setType('income')" class="flex-1 py-4 text-base font-semibold rounded-3xl flex items-center justify-center gap-2 transition-all">Thu nhập</button>
        </div>
      </div>

      <!-- Số tiền -->
      <div>
        <label class="text-xs uppercase tracking-widest text-gray-500 mb-3 block font-medium">Số tiền (₫)</label>
        <input type="number" id="amount" class="w-full text-4xl font-semibold py-5 px-6 bg-gray-50 border border-transparent focus:border-indigo-300 rounded-3xl outline-none text-center" placeholder="0" min="1000" step="1000" required>
      </div>

      <!-- Ngày -->
      <div>
        <label class="text-xs uppercase tracking-widest text-gray-500 mb-3 block font-medium">Ngày giao dịch</label>
        <input type="date" id="date" class="w-full py-5 px-6 bg-gray-50 border border-transparent focus:border-indigo-300 rounded-3xl outline-none text-lg">
      </div>

      <!-- Danh mục -->
      <div>
        <label class="text-xs uppercase tracking-widest text-gray-500 mb-3 block font-medium">Danh mục</label>
        <select id="category" required class="w-full py-5 px-6 bg-gray-50 border border-transparent focus:border-indigo-300 rounded-3xl outline-none text-lg"></select>
      </div>

      <!-- Ghi chú -->
      <div>
        <label class="text-xs uppercase tracking-widest text-gray-500 mb-3 block font-medium">Ghi chú</label>
        <input type="text" id="note" placeholder="Ví dụ: Ăn trưa cơm tấm" class="w-full py-5 px-6 bg-gray-50 border border-transparent focus:border-indigo-300 rounded-3xl outline-none text-lg">
      </div>

      <button type="submit" class="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 transition-colors text-white font-semibold text-xl py-6 rounded-3xl flex items-center justify-center gap-3">
        <i class="fa-solid fa-check"></i> LƯU GIAO DỊCH
      </button>
    </form>
  </div>
</div>

<script>
// ==================== DỮ LIỆU ====================
let transactions = [ /* giữ nguyên 30 giao dịch như cũ */ 
  {id:1, date:"2026-04-01", type:"expense", amount:450000, category:"Ăn uống", note:"Ăn trưa cơm tấm"},
  // ... (tôi giữ nguyên toàn bộ 30 item như file trước, để ngắn gọn mình bỏ qua ở đây nhưng bạn copy lại từ file cũ)
];

const expenseCategories = ["Ăn uống", "Di chuyển", "Mua sắm", "Giải trí", "Nhà cửa", "Sức khỏe", "Giáo dục"];
const incomeCategories = ["Lương", "Thưởng", "Tiết kiệm"];
const categoryColors = { /* giữ nguyên */ };

let pieChart, barChart, lineChart;
let currentType = "expense";

// ==================== CÁC HÀM CŨ (calculateSummary, renderTransactionList, updateAllCharts, resetFilters) ====================
// (giữ nguyên như file trước, để ngắn mình không paste lại hết)

// ==================== POPUP ====================
function openAddModal() {
  const modal = document.getElementById("addModal");
  if (!modal) return console.error("Không tìm thấy modal");
  modal.classList.remove("hidden");
  
  document.getElementById("date").value = "2026-04-16";
  document.getElementById("amount").value = "";
  document.getElementById("note").value = "";
  setType("expense");
}

function closeModal() {
  document.getElementById("addModal").classList.add("hidden");
}

function setType(type) {
  currentType = type;
  const btnExpense = document.getElementById("btnExpense");
  const btnIncome = document.getElementById("btnIncome");
  
  if (type === "expense") {
    btnExpense.classList.add("bg-rose-500", "text-white");
    btnExpense.classList.remove("bg-white", "text-gray-700");
    btnIncome.classList.add("bg-white", "text-gray-700");
    btnIncome.classList.remove("bg-emerald-500", "text-white");
  } else {
    btnIncome.classList.add("bg-emerald-500", "text-white");
    btnIncome.classList.remove("bg-white", "text-gray-700");
    btnExpense.classList.add("bg-white", "text-gray-700");
    btnExpense.classList.remove("bg-rose-500", "text-white");
  }
  populateCategories();
}

function populateCategories() {
  const select = document.getElementById("category");
  select.innerHTML = "";
  const cats = currentType === "expense" ? expenseCategories : incomeCategories;
  cats.forEach(cat => {
    const opt = document.createElement("option");
    opt.value = cat;
    opt.textContent = cat;
    select.appendChild(opt);
  });
}

function handleAddTransaction(e) {
  e.preventDefault();
  const amount = parseInt(document.getElementById("amount").value);
  if (!amount) return alert("Vui lòng nhập số tiền!");

  const newId = transactions.length ? Math.max(...transactions.map(t => t.id)) + 1 : 1;
  
  transactions.unshift({
    id: newId,
    date: document.getElementById("date").value,
    type: currentType,
    amount: amount,
    category: document.getElementById("category").value,
    note: document.getElementById("note").value.trim() || (currentType === "expense" ? "Chi tiêu mới" : "Thu nhập mới")
  });

  closeModal();
  updateAllCharts();

  // Toast thông báo
  const toast = document.createElement("div");
  toast.style.cssText = "position:fixed;bottom:80px;right:24px;background:#10b981;color:white;padding:12px 24px;border-radius:9999px;box-shadow:0 10px 15px -3px rgb(0 0 0 / 0.2);font-weight:500;display:flex;align-items:center;gap:8px;z-index:99999;";
  toast.innerHTML = `<i class="fa-solid fa-check-circle"></i> Đã thêm thành công!`;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

// ==================== KHỞI CHẠY ====================
document.getElementById("filterMonth").addEventListener("change", updateAllCharts);
updateAllCharts();   // ← chạy lần đầu
</script>
</body>
</html>
